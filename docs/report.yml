              - return_count
              - return_sum
              - sum_card
              - sum_cash
              - sum_online
              - sum_sbp
              - sum_all
              - revenue
              - average_sum
              - revenue_card
              - revenue_cash
              - revenue_online
              - revenue_sbp
              - average_revenue
