openapi: 3.0.0
info:
  title: Report
  description: Отвечает за отчеты dooglys
  version: 1.0.0
  contact:
    name: API Support
    url: https://dooglys.com
    email: info@dooglys.com
servers:
  - url: http://localhost:60028/api/v1
    description: Local
    variables: {}
  - url: https://report.stage.dgs/api/v1
    description: Stage
    variables: {}
  - url: https://report.production.dgs/api/v1
    description: Production
    variables: {}
security:
  - XContextHeader: []
paths:
  /report/rfm:
    get:
      tags:
        - Report
      summary: РФМ анализ покупателей
      description: ' Отчет строится по трем показателям (количество дней с последней покупки, количество покупок, сумма покупок), по каждому из них покупателю присваевается ценка от 1 до 3, в зависимости от того, в какой диапазон значений попадает покупатель.</br> Если покупатель попадает в диапазон от 0 до первой границы включительно присваевается оценка «1» ( для количества дней с последней покупки «3») </br> Если покупатель попадает в диапазон от первой границы до второй границы включительно присваевается оценка «2»</br> Клиентам, которые попали в диапазон от второй границы присваивается Оценка «3» ( для количества дней с последней покупки «1») </br> '
      operationId: ReportRFM
      parameters:
        - $ref: '#/components/parameters/dateFrom'
        - $ref: '#/components/parameters/dateTo'
        - $ref: '#/components/parameters/recencyFirstBound'
        - $ref: '#/components/parameters/recencySecondBound'
        - $ref: '#/components/parameters/frequencyFirstBound'
        - $ref: '#/components/parameters/frequencySecondBound'
        - $ref: '#/components/parameters/monetaryFirstBound'
        - $ref: '#/components/parameters/monetarySecondBound'
        - name: sort_by
          in: query
          required: true
          x-oapi-codegen-extra-tags:
            binding: omitempty,oneof=fio last_purchase_days purchase_quantity purchase_amount
          schema:
            type: string
            enum:
              - fio
              - last_purchase_days
              - purchase_quantity
              - purchase_amount
        - $ref: '#/components/parameters/SortOrder'
        - $ref: '#/components/parameters/groups'
        - $ref: '#/components/parameters/regionIDs'
        - $ref: '#/components/parameters/salePointIDs'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: ''
          headers:
            X-Pagination-Total-Count:
              $ref: '#/components/headers/XPaginationTotalCount'
            X-Pagination-Page-Count:
              $ref: '#/components/headers/XPaginationPageCount'
            X-Pagination-Current-Page:
              $ref: '#/components/headers/XPaginationCurrentPage'
            X-Pagination-Per-Page:
              $ref: '#/components/headers/XPaginationPerPage'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RFMReportCustomer'
        '400':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /report/rfm/groups:
    get:
      tags:
        - Report
      summary: Количество покупателей в рфм группах
      description: ''
      operationId: ReportRFMGroups
      parameters:
        - $ref: '#/components/parameters/dateFrom'
        - $ref: '#/components/parameters/dateTo'
        - $ref: '#/components/parameters/recencyFirstBound'
        - $ref: '#/components/parameters/recencySecondBound'
        - $ref: '#/components/parameters/frequencyFirstBound'
        - $ref: '#/components/parameters/frequencySecondBound'
        - $ref: '#/components/parameters/monetaryFirstBound'
        - $ref: '#/components/parameters/monetarySecondBound'
        - $ref: '#/components/parameters/groups'
        - $ref: '#/components/parameters/regionIDs'
        - $ref: '#/components/parameters/salePointIDs'
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
