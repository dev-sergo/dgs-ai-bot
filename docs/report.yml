                items:
                  $ref: '#/components/schemas/RFMReportGroup'
        '400':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /report/rfm/summary:
    get:
      tags:
        - Report
      summary: Резюме по РФМ анализу со средниими значениями по покупателям
      description: ''
      operationId: ReportRFMSummary
      parameters:
        - $ref: '#/components/parameters/dateFrom'
        - $ref: '#/components/parameters/dateTo'
        - $ref: '#/components/parameters/recencyFirstBound'
        - $ref: '#/components/parameters/recencySecondBound'
        - $ref: '#/components/parameters/frequencyFirstBound'
        - $ref: '#/components/parameters/frequencySecondBound'
        - $ref: '#/components/parameters/monetaryFirstBound'
        - $ref: '#/components/parameters/monetarySecondBound'
        - $ref: '#/components/parameters/groups'
        - $ref: '#/components/parameters/regionIDs'
        - $ref: '#/components/parameters/salePointIDs'
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RFMReportSummary'
        '400':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /report/type-order:
    get:
      tags:
        - Report
      summary: Отчет по типам заказов
      description: Отчет группирует продажи по дням и торговым точкам, считает суммы по типам оплаты для каждого типа заказа
      operationId: ReportTypeOrder
      parameters:
        - $ref: '#/components/parameters/dateFrom'
        - $ref: '#/components/parameters/dateTo'
        - $ref: '#/components/parameters/SortOrder'
        - name: sort_by
          in: query
          required: true
          x-oapi-codegen-extra-tags:
            binding: omitempty,oneof=shift_date region_name sale_point_name quantity sales_sum
          schema:
            type: string
            enum:
              - shift_date
              - region_name
              - sale_point_name
              - quantity
              - sales_sum
        - $ref: '#/components/parameters/regionIDs'
        - $ref: '#/components/parameters/salePointIDs'
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportTypeOrder'
        '400':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /report/customer-segmentation:
    post:
      tags:
        - Report
      summary: Отчет для сегментации покупателей по показателям
      description: Отчет собирает показатели покупателей на основе их покупок и т.д.
      operationId: ReportCustomerSegmentation
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/SortOrder'
        - name: sort_by
          in: query
          required: true
          x-oapi-codegen-extra-tags:
            binding: omitempty,oneof=fio birth_date sex registration_date bonus_quantity quantity avg_amount amount
          schema:
            type: string
            enum:
              - fio
              - birth_date
              - sex
              - registration_date
              - bonus_quantity
              - quantity
              - avg_amount
              - amount
      requestBody:
        description: ''
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportCustomerSegmentationFilter'
      responses:
        '200':
          description: ''
          headers:
            X-Pagination-Total-Count:
              $ref: '#/components/headers/XPaginationTotalCount'
            X-Pagination-Page-Count:
              $ref: '#/components/headers/XPaginationPageCount'
            X-Pagination-Current-Page:
              $ref: '#/components/headers/XPaginationCurrentPage'
            X-Pagination-Per-Page:
              $ref: '#/components/headers/XPaginationPerPage'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportCustomerSegmentation'
        '400':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /report/customer-list:
    post:
      tags:
        - Report
      summary: Отчет выбирает покупателей по указанным условиям
      description: В ответе будет список покупателей, которые соответствуют условиям, используется для динамических групп покупателей
      operationId: ReportCustomerList
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      requestBody:
        description: ''
        required: true
