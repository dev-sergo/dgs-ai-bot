            X-Pagination-Current-Page:
              $ref: '#/components/headers/XPaginationCurrentPage'
            X-Pagination-Per-Page:
              $ref: '#/components/headers/XPaginationPerPage'
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                  format: uuid
        '400':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /report/payment:
    get:
      tags:
        - Report
      summary: Выручка
      description: Суммирует выручку по дням
      operationId: ReportPayment
      parameters:
