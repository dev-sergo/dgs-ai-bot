        - $ref: '#/components/parameters/regionIDs'
        - $ref: '#/components/parameters/salePointIDs'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - name: group
          in: query
          required: false
          x-oapi-codegen-extra-tags:
            binding: omitempty,oneof=YYYY-MM-DD YYYY-WW YYYY-MM ID
          schema:
            type: string
            default: YYYY-MM-DD
            enum:
              - YYYY-MM-DD
              - YYYY-WW
              - YYYY-MM
              - ID
      responses:
