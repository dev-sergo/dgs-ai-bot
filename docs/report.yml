        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/dateFrom'
        - $ref: '#/components/parameters/dateTo'
        - $ref: '#/components/parameters/regionIDs'
        - $ref: '#/components/parameters/salePointIDs'
        - $ref: '#/components/parameters/userIDs'
        - $ref: '#/components/parameters/paymentTypes'
        - $ref: '#/components/parameters/productIDs'
        - $ref: '#/components/parameters/orderID'
        - name: order_number
          in: query
          description: Номер заказа (пока не работает)
          required: false
          schema:
            type: string
        - name: types[]
          description: Типы чека
          in: query
          required: false
          x-go-type-skip-optional-pointer: true
          schema:
            type: array
            items:
              $ref: '#/components/schemas/SalesDocumentTradeType'
        - name: sort_by
          in: query
          required: true
          x-oapi-codegen-extra-tags:
            binding: omitempty,oneof=number shift_number close_user_name cashier_name terminal_name close_date close paid total_cost sell_discount discount profit
          schema:
