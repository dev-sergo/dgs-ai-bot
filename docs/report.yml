          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /report/products:
    get:
      tags:
        - Report
      summary: Продажи товаров
      description: ''
      operationId: ReportProducts
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/dateFrom'
        - $ref: '#/components/parameters/dateTo'
        - $ref: '#/components/parameters/regionIDs'
        - $ref: '#/components/parameters/salePointIDs'
        - $ref: '#/components/parameters/userIDs'
        - $ref: '#/components/parameters/productCategoryIds'
        - $ref: '#/components/parameters/productIDs'
        - name: include_zero_price
          description: Включать ли товары с нулевой ценой
          in: query
          required: false
          x-go-type-skip-optional-pointer: true
          schema:
            type: boolean
            default: false
        - name: sort_by
          in: query
          required: true
          x-oapi-codegen-extra-tags:
            binding: omitempty,oneof=name article quantity quantity_with_discount quantity_without_discount amount amount_with_discount  amount_without_discount revenue revenue_with_discount revenue_without_discount profit profit_with_discount profit_without_discount discount_sum
          schema:
            type: string
            enum:
              - name
              - article
              - quantity
              - quantity_with_discount
              - quantity_without_discount
              - amount
              - amount_with_discount
              - amount_without_discount
              - revenue
              - revenue_with_discount
              - revenue_without_discount
              - profit
              - profit_with_discount
              - profit_without_discount
              - discount_sum
        - $ref: '#/components/parameters/SortOrder'
      responses:
        '200':
          description: ''
          headers:
            X-Pagination-Total-Count:
              $ref: '#/components/headers/XPaginationTotalCount'
