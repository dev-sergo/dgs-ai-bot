server {
    listen 80;
    server_name _;

    # Корень со статикой собранного фронта.
    root /usr/share/nginx/html;

    # API → Go-сервис во внутренней сети compose (имя сервиса = bot).
    # Trailing slash в proxy_pass срезает префикс /api:
    #   запрос /api/ask  →  до bot доходит /ask
    # (фронт по умолчанию зовёт относительный /api/ask, см. web/src/api.ts).
    location /api/ {
        proxy_pass http://bot:8088/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # LLM может думать дольше дефолтных 60s nginx — поднимаем,
        # чтобы запросы к планировщику/нарратору не обрывались по 504.
        proxy_read_timeout 200s;
        proxy_send_timeout 200s;
    }

    # SPA-фолбэк: любой неизвестный путь отдаёт index.html (клиентский роутинг).
    location / {
        try_files $uri /index.html;
    }
}
