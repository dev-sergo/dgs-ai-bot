# Dooglys AI-bot — Telegram-only деплой (мультитенант, N ботов).
#
# Один процесс cmd/bot поднимает ПО БОТУ НА КАЖДОГО тенанта из TENANTS (см. .env).
# Каждый бот жёстко привязан к своему тенанту и своему whitelist'у; общий движок
# резолвит источник данных по tenant_id (изоляция). Портов наружу НЕТ: боты ходят
# к api.telegram.org, роутеру моделей (LLM_BASE_URL) и api.dooglys.com только по
# ИСХОДЯЩИМ соединениям. Секреты — в .env рядом с этим файлом (в git НЕ коммитим).
#
# Запуск:  cp .env.example .env  &&  <заполнить .env>  &&  docker compose up -d --build
# Логи:    docker compose logs -f
# Стоп:    docker compose down
services:
  bots:
    build: .
    # Образ по умолчанию стартует HTTP-сервер (cmd/server); здесь переопределяем на бота.
    entrypoint: ["/app/bot"]
    # Запускаем контейнер ПОД ХОСТОВЫМ ПОЛЬЗОВАТЕЛЕМ (владельцем ./data), а не под nonroot
    # uid 65532 из образа. Тогда bind-mount ./data пишется без chown под чужой uid — каталог
    # остаётся под твоим юзером. Значения — из .env (HOST_UID/HOST_GID = `id -u`/`id -g`).
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    # Все переменные окружения (тенанты, LLM-роутер, Report-API, логи) берутся из .env.
    env_file: .env
    volumes:
      # JSONL-датасет вопрос→план→ответ и оценки 👍/👎. Пишется в /app/data → на хост в
      # ./data (владелец = HOST_UID). Append-only, переживает рестарт.
      - ./data:/app/data
    # Процесс-liveness: упал (напр. невалидный bot-токен → fail-fast) — контейнер
    # перезапускается. distroless без shell → HEALTHCHECK-команду не запустить,
    # мониторинг по `docker compose ps` / `docker compose logs`.
    restart: unless-stopped
