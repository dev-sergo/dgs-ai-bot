services:
  bot:
    build: .
    ports:
      - "8088:8088"
    environment:
      HTTP_ADDR: ":8088"
      # LLM-риг пользователя (llama.cpp, OpenAI-совместимый).
      LLM_BASE_URL: "${LLM_BASE_URL:-http://172.20.10.2:8080}"
      LLM_MODEL: "${LLM_MODEL:-qwen2-5-32b-instruct-q4-k-m-ctx-8k-q8-0-kv-t07}"
      # planner=stub → работа без GPU/сети (детерминированные планы).
      PLANNER_MODE: "${PLANNER_MODE:-llm}"
      FIXTURES_PATH: "/app/docs/contracts/fixtures"
    # LLM-риг в LAN — даём контейнеру доступ к сети хоста при необходимости.
    extra_hosts:
      - "host.docker.internal:host-gateway"
