# Dooglys AI-bot — Telegram-only deploy (multi-tenant, N bots).
#
# A single cmd/bot process runs ONE BOT PER TENANT from TENANTS (see .env). Each bot is
# hard-bound to its tenant and its own whitelist; the shared engine resolves the data
# source by tenant_id (isolation). No published ports: bots only make OUTBOUND calls to
# api.telegram.org, the model router (LLM_BASE_URL) and api.dooglys.com. Secrets live in
# .env next to this file (NOT committed to git).
#
# Start:  cp .env.example .env  &&  <fill in .env>  &&  docker compose up -d --build
# Logs:   docker compose logs -f
# Stop:   docker compose down
services:
  bots:
    build: .
    # The image starts the HTTP server (cmd/server) by default; override to the bot here.
    entrypoint: ["/app/bot"]
    # Run the container AS THE HOST USER (owner of ./data), not the image's nonroot uid
    # 65532. Then the bind-mounted ./data is writable without chowning to a foreign uid —
    # the directory stays under your user. Values come from .env (HOST_UID/HOST_GID = `id -u`/`id -g`).
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    # All env vars (tenants, LLM router, Report-API, logs) are taken from .env.
    env_file: .env
    volumes:
      # JSONL dataset question→plan→answer and 👍/👎 ratings. Written to /app/data → host
      # ./data (owner = HOST_UID). Append-only, survives restarts.
      - ./data:/app/data
    # Process liveness: if it dies (e.g. invalid bot token → fail-fast) the container
    # restarts. distroless has no shell → a HEALTHCHECK command can't run; monitor via
    # `docker compose ps` / `docker compose logs`.
    restart: unless-stopped
